name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Push mới lên cùng branch/PR sẽ hủy run cũ đang chạy — tiết kiệm phút CI
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Lint & Format — chạy trước, nhanh nhất
  # ─────────────────────────────────────────────
  lint:
    name: Backend lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements-dev.txt

      # Rule set E, F, I, N, W, UP — cấu hình tại backend/ruff.toml
      - run: ruff check . --output-format=github

      # Chỉ báo lỗi, không tự sửa — dev tự chạy `ruff format` ở local
      - run: ruff format --check .

  # ─────────────────────────────────────────────
  # Job 2: Tests — chỉ chạy sau khi lint pass
  # ─────────────────────────────────────────────
  test:
    name: Backend tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      # sentence-transformers kéo theo torch (~2GB) — bỏ qua trong CI vì tests
      # chỉ test logic thuần (guardrails, document relation), không load embedding model.
      # Docker build ở Job 3 vẫn cài đủ toàn bộ requirements.txt.
      - name: Install dependencies
        run: |
          grep -v "sentence-transformers" requirements.txt | pip install -r /dev/stdin
          pip install -r requirements-dev.txt

      # Không cần secret thật: Settings đều có default, tests không gọi mạng
      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=app --cov-report=xml --cov-report=term-missing

      # Lưu coverage report để xem sau, kể cả khi test fail
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: coverage-report
          path: backend/coverage.xml

  # ─────────────────────────────────────────────
  # Job 3: Docker Build — verify Dockerfile không broken
  # ─────────────────────────────────────────────
  build:
    name: Docker build (backend)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # push: false — chỉ build để verify, chưa push registry.
      # Deploy dùng Render deploy hook (Render tự build từ repo) — xem deploy.yml
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: false
          tags: vaic-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Frontend hiện mới chỉ có Dockerfile, chưa có package.json/source.
  # Khi frontend có code, thêm job: npm ci -> lint -> build + docker build tương ứng.
